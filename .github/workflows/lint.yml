name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ruff-${{ hashFiles('ruff.toml', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ruff-

      - name: Install ruff
        run: pip install "ruff>=0.7.0"

      - name: Ruff check
        run: ruff check
