{% extends "base.html" %}

{% block content %}
<div class="space-y-4">
    <!-- Page Header -->
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="/" class="btn btn-ghost btn-sm">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back
            </a>
            <div>
                <h1 class="text-xl font-bold theme-text-primary">Starred Jobs</h1>
                <p class="text-sm theme-text-secondary">Your favorited jobs in one place</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="favorites-job-count" class="text-sm theme-text-secondary">
                <span class="font-semibold">0</span> starred
            </span>
        </div>
    </div>

    <!-- Table Container -->
    <div class="panel overflow-hidden">
        <div id="favorites-table-container"
             hx-get="/partials/favorites-rows"
             hx-trigger="load"
             hx-indicator=".htmx-indicator">
            <!-- Loading skeleton -->
            <div class="p-8 text-center">
                <svg class="animate-spin h-8 w-8 mx-auto theme-text-tertiary" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="mt-2 text-sm theme-text-secondary">Loading starred jobs...</p>
            </div>
        </div>
    </div>
</div>

<script>
// Refresh table when a star is toggled
document.body.addEventListener('starredChanged', function() {
    htmx.trigger('#favorites-table-container', 'load');
});
</script>
{% endblock %}
