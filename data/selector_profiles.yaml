# Dimensional Selector Profiles
# Each profile defines a regional/thematic selector with its own quota and ranking.
# Run: python scripts/scout_dimensional_selector.py --profile <name> [--dry-run]

uae_ksa_leadership:
  description: "Top AI leadership roles in UAE & KSA"
  quota: 6
  cron: "every 6h"
  source_tag: "scout_dim_uae_ksa"
  location_patterns:
    - UAE
    - Dubai
    - Abu Dhabi
    - Sharjah
    - Ajman
    - KSA
    - Saudi
    - Riyadh
    - Jeddah
    - Dammam
    - NEOM
  rank_boosts:
    leadership: 15     # head, lead, director, vp, chief, principal, staff
    high_score: 0      # natural score weight
    newest: 5          # posted recently bonus

global_remote:
  description: "Top remote-everywhere AI roles globally"
  quota: 3
  cron: "every 3h"
  source_tag: "scout_dim_global_remote"
  location_patterns:
    - remote
    - worldwide
    - anywhere
    - global
  location_mode: "require_any"  # job must match at least one pattern
  rank_boosts:
    leadership: 10
    high_score: 0
    newest: 5

