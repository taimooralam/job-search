disambiguation_rules:
  - id: tech_lead_vs_engineering_manager
    pair: [tech_lead, engineering_manager]
    when_any:
      responsibility_signals:
        engineering_manager:
          - manage engineers
          - performance reviews
          - hiring
          - people management
      qualification_signals:
        engineering_manager:
          - people management
          - management experience
    prefer: engineering_manager
  - id: tech_lead_vs_staff_principal
    pair: [tech_lead, staff_principal_engineer]
    when_any:
      qualification_signals:
        staff_principal_engineer:
          - principal level
          - staff level
      seniority_signals:
        staff_principal_engineer: [staff, principal]
    prefer: staff_principal_engineer
  - id: director_head_vp_title_priority
    pair: [director_of_engineering, head_of_engineering, vp_engineering]
    title_priority:
      vp_engineering: [vp engineering, vice president engineering, vp of engineering, svp engineering]
      head_of_engineering: [head of engineering, head engineering]
      director_of_engineering: [director of engineering, engineering director]
  - id: cto_title_priority
    pair: [cto, vp_engineering, head_of_engineering]
    title_priority:
      cto: [cto, chief technology officer, chief ai officer]

search_profiles:
  ai_core:
    description: "Core AI IC search set."
    likely_primary_role_categories: [senior_engineer, tech_lead]
  ai_leadership:
    description: "Head/Director/VP/manager AI leadership search set."
    likely_primary_role_categories: [engineering_manager, director_of_engineering, head_of_engineering, vp_engineering, cto]
  ai_senior_ic:
    description: "Staff/principal/senior AI IC search set."
    likely_primary_role_categories: [staff_principal_engineer, senior_engineer, tech_lead]
  ai_architect:
    description: "AI architect and systems architect search set."
    likely_primary_role_categories: [staff_principal_engineer, tech_lead, cto]

selector_profiles:
  tech-lead:
    description: "Lead engineer / technical lead / team lead family."
    likely_primary_role_categories: [tech_lead]
  architect:
    description: "Architect family across software, cloud, data, enterprise, AI."
    likely_primary_role_categories: [staff_principal_engineer, cto]
  staff-principal:
    description: "Staff, principal, distinguished, fellow."
    likely_primary_role_categories: [staff_principal_engineer]
  head-director:
    description: "Head, director, VP, chief, CTO/CIO/CAIO."
    likely_primary_role_categories: [director_of_engineering, head_of_engineering, vp_engineering, cto]
  engineering-manager:
    description: "Engineering manager family."
    likely_primary_role_categories: [engineering_manager]

tone_families:
  hands_on:
    description: "Execution-heavy IC framing."
  player_coach:
    description: "Hands-on leadership framing for small-team or hybrid roles."
  architect:
    description: "Systems, design, scale, and technical strategy framing."
  executive:
    description: "Org, business, and strategic leadership framing."

ideal_candidate_archetypes:
  technical_architect:
    description: "Influences through system design and architecture decisions."
  people_leader:
    description: "Builds teams and develops talent."
  execution_driver:
    description: "Ships, unblocks, and delivers consistently."
  strategic_visionary:
    description: "Aligns technology direction with business outcomes."
  domain_expert:
    description: "Brings deep expertise in a specific technical domain."
  builder_founder:
    description: "Thrives in ambiguity and zero-to-one or scale-up conditions."
  process_champion:
    description: "Establishes engineering excellence and operating cadence."
  hybrid_technical_leader:
    description: "Balances code-level authority with leadership responsibility."

ai_taxonomy:
  specializations:
    none:
      description: "No AI/ML specialization signaled."
      title_signals: []
      responsibility_signals: []
      keyword_signals: []
      legacy_categories: []
      scope_tags: []
    ai_core:
      description: "Applied ML / AI core IC work."
      title_signals: [ai engineer, ml engineer, applied scientist, machine learning engineer]
      responsibility_signals: [train models, fine tune models, build rag systems, model evaluation, deploy ml systems]
      keyword_signals: [pytorch, tensorflow, huggingface, transformers, llm, rag, inference]
      legacy_categories: [ai_general]
      scope_tags: [applied_ai]
    genai_llm:
      description: "GenAI / LLM product or application work."
      title_signals: [genai engineer, llm engineer, ai application engineer]
      responsibility_signals: [build genai products, prompt engineering, evaluations, guardrails, agent workflows]
      keyword_signals: [llm, genai, rag, prompt engineering, agentic, guardrails, evaluations]
      legacy_categories: [ai_general, genai_llm]
      scope_tags: [genai_product, agentic_systems, rag]
    mlops_llmops:
      description: "ML/LLM platform and operations."
      title_signals: [mlops engineer, llmops engineer, ai platform engineer]
      responsibility_signals: [model serving, inference platform, feature store, vector store, model platform]
      keyword_signals: [mlops, llmops, model serving, inference platform, vector store, feature store]
      legacy_categories: [ai_general, mlops_llmops]
      scope_tags: [model_platform, mlops_llmops]
    ai_leadership:
      description: "AI-focused engineering leadership."
      title_signals: [head of ai, director of ai, vp of ai, chief ai officer, ai engineering leader]
      responsibility_signals: [lead ai strategy, build ai teams, own ai roadmap, govern ai platform]
      keyword_signals: [ai strategy, ai platform, ai governance]
      legacy_categories: [ai_general]
      scope_tags: [ai_leadership, ai_governance]
    ai_architect:
      description: "AI-focused staff/principal or architect IC."
      title_signals: [ai architect, ml architect, principal ai engineer, staff ai engineer]
      responsibility_signals: [design ai architecture, define ai platform standards, architect rag systems]
      keyword_signals: [ai architecture, rag, llm platform, agentic systems]
      legacy_categories: [ai_general]
      scope_tags: [ai_architecture, agentic_systems, rag]
  intensity_levels: [none, adjacent, significant, core]
  scope_tags:
    - applied_ai
    - genai_product
    - agentic_systems
    - rag
    - model_platform
    - mlops_llmops
    - ai_architecture
    - ai_leadership
    - ai_governance

