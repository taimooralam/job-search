version: "2026-04-20-v2"
description: "Canonical Stage 1 taxonomy for role classification, search/selector interoperability, tone, AI taxonomy, and application-surface portal families."

source_files:
  - src/preenrich/stages/classification.py
  - src/preenrich/stages/jd_facts.py
  - src/layer1_4/prompts.py
  - n8n/skills/top-jobs/scripts/top_jobs.py
  - .codex/skills/top-jobs/SKILL.md
  - .codex/skills/scout-jobs/SKILL.md
  - n8n/skills/scout-jobs/scripts/scout_linkedin_jobs.py
  - .claude/skills/apply-jobs/modules/portal-detection.md
  - data/portal-playbooks/

design_rules:
  - "primary_role_category answers what engineering role this is."
  - "tone_family answers how the role should be framed."
  - "search_profiles and selector_profiles preserve compatibility with existing search and ranking workflows."
  - "portal_family is part of application_surface, not role identity."
  - "AI specialization is orthogonal to role seniority and management scope."
  - "classification owns taxonomy artifacts; extracted_jd.role_category remains a compatibility projection."

classification_engine:
  score_weights:
    title: 3.0
    jd_facts_role_category: 2.8
    responsibilities: 2.0
    qualifications: 1.5
    keywords: 1.2
    competency: 1.4
    archetype: 1.0
    seniority: 1.0
  thresholds:
    high_confidence: 0.6
    short_circuit_margin: 0.2
    disambiguation_margin: 0.15

