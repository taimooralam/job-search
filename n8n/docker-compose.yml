services:
  traefik:
    image: traefik:latest
    container_name: n8n-traefik
    restart: always
    command:
      - "--api=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.mytlschallenge.acme.tlschallenge=true"
      - "--certificatesresolvers.mytlschallenge.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.websecure.transport.respondingtimeouts.idletimeout=600s"
      - "--entrypoints.websecure.transport.respondingtimeouts.readtimeout=600s"
      - "--entrypoints.websecure.transport.respondingtimeouts.writetimeout=600s"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_data:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8npassword
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n-main:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n-main
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      - SUBDOMAIN=${SUBDOMAIN}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      # Core URLs
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/
      - N8N_EDITOR_BASE_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/

      # Timezone
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}

      # Security / proxy
      - N8N_SECURE_COOKIE=false
      - N8N_TRUSTED_PROXIES=*

      # Features
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_EXPERIMENTAL_FEATURES=ai

      # Encryption + logging
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_LOG_LEVEL=info

      # Queue mode
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379

      # Database → Postgres
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8npassword
      - DB_POSTGRESDB_SCHEMA=public

      # Deprecation-safe flags
      - N8N_RUNNERS_ENABLED=true
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_GIT_NODE_DISABLE_BARE_REPOS=true
    volumes:
      - n8n_data:/home/node/.n8n
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.entrypoints=web,websecure
      - traefik.http.routers.n8n.tls.certresolver=mytlschallenge
      - traefik.http.services.n8n.loadbalancer.server.port=5678

  n8n-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["worker"]
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      - SUBDOMAIN=${SUBDOMAIN}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      - NODE_ENV=production
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_LOG_LEVEL=info

      - N8N_RUNNERS_ENABLED=true

      # Queue mode
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379

      # DB (same as main)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8npassword
      - DB_POSTGRESDB_SCHEMA=public
    volumes:
      - n8n_data:/home/node/.n8n

  oc:
    build:
      context: .
      dockerfile: Dockerfile.oc
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: oc
    restart: always
    user: root
    # No init script — gateway started inline. Skills copied from /opt/skills/ on boot.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cp -r /opt/skills/* /home/node/.openclaw/skills/ 2>/dev/null
        mkdir -p /home/node/.openclaw/data/scout
        chown -R node:node /home/node/.openclaw 2>/dev/null
        exec su -s /bin/sh node -c 'cd /app && exec node openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789 --auth token'
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - MONGODB_URI=${MONGODB_URI}
      - ATLAS_MONGODB_URI=${ATLAS_MONGODB_URI}
      - RUNNER_URL=${RUNNER_URL}
      - RUNNER_API_SECRET=${RUNNER_API_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - PDF_SERVICE_URL=${PDF_SERVICE_URL}
      - FIRECRAWL_DAILY_LIMIT=20
      - SCOUT_QUEUE_DIR=/home/node/.openclaw/data/scout
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - oc_data:/home/node/.openclaw
      # Cookies
      - /root/n8n-prod/yt-cookies.txt:/home/node/yt-cookies.txt:ro
      - /root/n8n-prod/cookies/linkedin-cookies.txt:/home/node/linkedin-cookies.txt:ro
      # Codex CLI auth
      - /root/n8n-prod/credentials/codex-auth.json:/root/.codex/auth.json:ro
      # yt-dlp skill (not in git repo, lives on VPS only)
      - /root/n8n-prod/skills/yt-dlp:/home/node/.openclaw/skills/yt-dlp:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.oc.rule=Host(`claw.srv1112039.hstgr.cloud`)
      - traefik.http.routers.oc.tls=true
      - traefik.http.routers.oc.entrypoints=web,websecure
      - traefik.http.routers.oc.tls.certresolver=mytlschallenge
      - traefik.http.services.oc.loadbalancer.server.port=18789

volumes:
  n8n_data:
    external: false   # your existing volume with config & license
  traefik_data:
    external: true
  postgres_data:
    external: false  # new; Docker will create it
  oc_data:
    external: false
